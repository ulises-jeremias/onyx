apiVersion: v1
entries:
  onyx:
  - annotations:
      artifacthub.io/changes: |
        - kind: security
          description: Add an egress NetworkPolicy on the Craft sandbox pods restricting their egress to
            the sandbox proxy (:8080) and kube-dns (:53) only. CNI-layer backstop to the in-pod iptables
            in firewall-init.sh, so a sandbox that bypasses that iptables still cannot reach anything but
            the proxy. DNS is allowed because sandbox-init resolves the proxy FQDN before its iptables
            closes DNS.
      category: Productivity
      images: |
        - name: webserver
          image: docker.io/onyxdotapp/onyx-web-server:latest
        - name: background
          image: docker.io/onyxdotapp/onyx-backend:latest
      licenses: MIT
    apiVersion: v2
    appVersion: latest
    created: "2026-07-16T00:08:30.450761424Z"
    dependencies:
    - alias: postgresql
      condition: postgresql.enabled
      name: cloudnative-pg
      repository: https://cloudnative-pg.github.io/charts
      version: 0.26.0
    - condition: opensearch.enabled
      name: opensearch
      repository: https://opensearch-project.github.io/helm-charts
      version: 3.6.0
    - alias: nginx
      condition: nginx.enabled
      name: ingress-nginx
      repository: https://kubernetes.github.io/ingress-nginx
      version: 4.13.3
    - condition: redisOperator.enabled,redis.enabled
      name: redis-operator
      repository: https://ot-container-kit.github.io/helm-charts
      version: 0.24.0
    - condition: redis.enabled
      name: redis
      repository: https://ot-container-kit.github.io/helm-charts
      version: 0.16.6
    - condition: minio.enabled
      name: minio
      repository: https://charts.min.io/
      version: 5.4.0
    - condition: codeInterpreter.enabled
      name: code-interpreter
      repository: https://onyx-dot-app.github.io/python-sandbox/
      version: 0.4.3
    description: Onyx application and Craft sandbox deployment chart
    digest: eadf51e85efe3456d39bea87970db46dc3d31bf9aade60acc8daaeb4b59008d9
    home: https://www.onyx.app/
    name: onyx
    sources:
    - https://github.com/onyx-dot-app/onyx
    type: application
    urls:
    - https://ulises-jeremias.github.io/onyx/onyx-0.6.7.tgz
    version: 0.6.7
  - annotations:
      artifacthub.io/changes: |
        - kind: security
          description: Add an egress NetworkPolicy on the Craft sandbox egress proxy that blocks the
            link-local / cloud-metadata range (169.254.0.0/16), so a sandbox can't use the proxy as an
            SSRF pivot to the node's IMDS credentials. Internet, DNS, and datastores remain reachable.
      category: Productivity
      images: |
        - name: webserver
          image: docker.io/onyxdotapp/onyx-web-server:latest
        - name: background
          image: docker.io/onyxdotapp/onyx-backend:latest
      licenses: MIT
